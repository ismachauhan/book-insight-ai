<!DOCTYPE html>
<html>
<head>
    <title>Book Insight AI</title>
</head>
<body>

    <h1>📚 Book Insight AI</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="question" placeholder="Ask about books..." required>
        <button type="submit">Search</button>
    </form>

    <hr>

    {% if results %}
        <h2>Results:</h2>
        <ul>
            {% for book in results %}
                <li>
                    <strong>{{ book.title }}</strong><br>
                    {{ book.summary }}
                </li>
                <br>
            {% endfor %}
        </ul>
    {% endif %}

</body>
</html>
