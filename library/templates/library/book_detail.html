<!DOCTYPE html>
<html>
<head>
    <title>Book Detail</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Book-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-[#fdfbfb] to-[#ebedee]">

<!-- 🔥 HERO HEADER -->
<div class="relative h-[220px] bg-[url('https://images.unsplash.com/photo-1512820790803-83ca734da794')] bg-cover bg-center">

    <div class="absolute inset-0 bg-black/50 flex items-center justify-center text-center">

        <h1 class="text-3xl md:text-4xl font-bold text-white font-[Playfair_Display] px-4">
            {{ book.title }}
        </h1>

    </div>
</div>

<!-- 🔥 MAIN CONTENT -->
<div class="max-w-4xl mx-auto mt-10 px-6 pb-10">

    <!-- 🔹 Book Info Card -->
    <div class="bg-white rounded-xl shadow-md hover:shadow-xl transition duration-300 p-6">

        <!-- Metadata -->
        <div class="text-gray-600 text-sm space-y-1 mb-4">
            <p>👤 <span class="font-medium">Author:</span> {{ book.author|default:"Unknown" }}</p>
            <p>⭐ <span class="font-medium">Rating:</span> {{ book.rating|default:"N/A" }} / 5</p>
            <p>📂 <span class="font-medium">Genre:</span> {{ book.genre|default:"N/A" }}</p>
        </div>

        <!-- Description -->
        <div class="mt-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-2">📖 Description</h2>
            <p class="text-gray-700 leading-relaxed">
                {{ book.description }}
            </p>
        </div>

        <!-- AI Summary -->
        <div class="mt-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-2">🤖 AI Summary</h2>
            <div class="bg-gray-100 p-4 rounded-lg text-gray-700">
                {{ book.ai_summary }}
            </div>
        </div>

        <!-- Source -->
        <div class="mt-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-2">🔗 Source</h2>
            <a href="{{ book.source_url }}" target="_blank"
               class="text-red-500 hover:underline">
                View Original Book Page →
            </a>
        </div>

        <!-- Back -->
        <div class="mt-8">
            <a href="/" class="text-gray-600 hover:text-black">
                ← Back to Dashboard
            </a>
        </div>

    </div>

</div>

</body>
</html>
