<!DOCTYPE html>
<html>
<head>
    <title>Book Detail</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }

        .glass {
            backdrop-filter: blur(18px);
            background: rgba(20, 18, 32, 0.7);
        }
    </style>
</head>

<body class="text-white">

<div class="min-h-screen bg-[url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f')] bg-cover bg-center">

    <div class="min-h-screen bg-black/80">

        <div class="relative h-[260px] flex items-center justify-center text-center px-4">

            <h1 class="heading-font text-4xl md:text-5xl font-bold">
                {{ book.title }}
            </h1>

        </div>

        <div class="max-w-4xl mx-auto px-6 pb-12">

            <div class="glass rounded-2xl shadow-xl p-6">

                <div class="text-gray-300 text-sm space-y-2 mb-6">
                    <p>👤 <span class="text-white">Author:</span> {{ book.author|default:"Unknown" }}</p>
                    <p>⭐ <span class="text-white">Rating:</span> {{ book.rating|default:"N/A" }} / 5</p>
                    <p>📂 <span class="text-white">Genre:</span> {{ book.genre|default:"N/A" }}</p>
                </div>

                <div class="mt-6">
                    <h2 class="text-lg font-semibold text-purple-300 mb-2">📖 Description</h2>
                    <p class="text-gray-200 leading-relaxed">
                        {{ book.description }}
                    </p>
                </div>

                <div class="mt-6">
                    <h2 class="text-lg font-semibold text-pink-300 mb-2">🤖 AI Summary</h2>
                    <div class="bg-white/5 p-4 rounded-lg text-gray-200">
                        {{ book.ai_summary }}
                    </div>
                </div>

                <div class="mt-6">
                    <h2 class="text-lg font-semibold text-purple-300 mb-2">🔗 Source</h2>
                    <a href="{{ book.source_url }}" target="_blank"
                       class="text-pink-400 hover:text-white transition">
                        View Original Book Page →
                    </a>
                </div>

                <div class="mt-8">
                    <a href="/" class="text-gray-400 hover:text-white transition">
                        ← Back to Dashboard
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
