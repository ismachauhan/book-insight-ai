<!DOCTYPE html>
<html>
<head>
    <title>Book Detail</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 750px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .meta {
            color: #555;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .section {
            margin-top: 20px;
        }

        .label {
            font-weight: bold;
            font-size: 16px;
        }

        .text {
            margin-top: 5px;
            color: #444;
            line-height: 1.5;
        }

        .link {
            display: inline-block;
            margin-top: 10px;
            color: #4CAF50;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #4CAF50;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .highlight {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>{{ book.title }}</h1>

        <div class="meta">
            👤 Author: {{ book.author|default:"Unknown" }} <br>
            ⭐ Rating: {{ book.rating|default:"N/A" }} / 5 <br>
            📂 Genre: {{ book.genre|default:"N/A" }}
        </div>

        <div class="section">
            <div class="label">📖 Description:</div>
            <div class="text highlight">{{ book.description }}</div>
        </div>

        <div class="section">
            <div class="label">🤖 AI Summary:</div>
            <div class="text highlight">{{ book.ai_summary }}</div>
        </div>

        <div class="section">
            <div class="label">🔗 Source:</div>
            <a href="{{ book.source_url }}" target="_blank" class="link">
                View Original Book Page
            </a>
        </div>

        <a href="/" class="back-link">← Back to Dashboard</a>

    </div>

</body>
</html>
