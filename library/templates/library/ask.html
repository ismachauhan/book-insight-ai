<!DOCTYPE html>
<html>
<head>
    <title>Ask Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-[#fdfbfb] to-[#ebedee] scroll-smooth">


<div class="relative h-[250px] bg-[url('https://images.unsplash.com/photo-1512820790803-83ca734da794')] bg-cover bg-center">

    <div class="absolute inset-0 bg-black/50 flex flex-col justify-center items-center text-center">

        <h1 class="text-4xl font-bold text-white font-[Playfair_Display]">
            Ask About Books 🤖
        </h1>

        <p class="text-gray-200 mt-2">
            Find summaries, recommendations & more
        </p>
    </div>
</div>


<div class="max-w-3xl mx-auto mt-10 px-6 opacity-0 animate-[fadeIn_0.5s_forwards]">

    
    <form method="POST" onsubmit="showLoading()" class="flex gap-2">
        {% csrf_token %}
        <input type="text" name="question"
            placeholder="Try: sci-fi books, summary of..."
            class="flex-1 p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-400 focus:shadow-md transition"
            required>
        <button class="bg-red-500 text-white px-5 rounded-lg hover:bg-red-600 active:scale-95 transition duration-200">
            🔍
        </button>
    </form>

    <p id="loading" class="hidden text-gray-500 mt-3">
        ⏳ Thinking...
    </p>

    
    {% if answer %}
    <div class="bg-white p-5 rounded-xl shadow-md hover:shadow-lg transition duration-300">

        <h2 class="text-lg font-semibold mb-2">✨ Answer</h2>
        <p class="text-gray-700 whitespace-pre-line">{{ answer }}</p>

        {% if sources %}
        <div class="mt-4">
            <h3 class="font-medium mb-2">📖 Related Books</h3>

            {% for book in sources %}
            <div class="mt-2">
                <a href="/book/{{ book.id }}/"
                   class="text-red-500 hover:text-black transition">
                    {{ book.title }}
                </a>
            </div>
            {% endfor %}
        </div>
        {% endif %}

    </div>
    {% endif %}

    
    <div class="flex justify-between mt-6 text-sm">
        <a href="/" class="text-gray-600 hover:text-black transition">← Dashboard</a>
        <a href="/history/" class="text-gray-600 hover:text-black transition">📜 History</a>
    </div>

</div>

<script>
function showLoading() {
    document.getElementById("loading").classList.remove("hidden");
}
</script>

</body>
</html>
