<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }

        .glass {
            backdrop-filter: blur(18px);
            background: rgba(20, 18, 32, 0.7);
        }
    </style>
</head>

<body class="text-white">

<div class="min-h-screen bg-[url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f')] bg-cover bg-center">

    <div class="min-h-screen bg-black/80">

        <div class="h-[240px] flex items-center justify-center text-center">
            <h1 class="heading-font text-4xl font-bold">
                📜 Your History
            </h1>
        </div>

        <div class="max-w-3xl mx-auto px-6 pb-12">

            {% if history %}
                {% for item in history reversed %}
                <div class="glass p-5 rounded-2xl shadow-xl mb-4 hover:scale-[1.02] transition">

                    <p class="font-semibold text-purple-300">
                        Q: {{ item.question }}
                    </p>

                    <div class="text-gray-200 leading-relaxed space-y-2">
    {% for line in item.answer.splitlines %}
        {% if line %}
            <p>{{ line }}</p>
        {% endif %}
    {% endfor %}
</div>

                </div>
                {% endfor %}
            {% else %}
                <p class="text-gray-300 text-center">No history yet 😄</p>
            {% endif %}

            <div class="mt-8 text-center">
                <a href="/ask/" class="text-gray-400 hover:text-white transition">
                    ← Back to Ask Page
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
