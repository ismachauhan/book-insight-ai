<!DOCTYPE html>
<html>
<head>
    <title>History</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f8;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .question {
            font-weight: bold;
        }

        .answer {
            margin-top: 5px;
            color: #444;
        }

        .back {
            display: block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #4CAF50;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/ask/" class="back">← Back to Q&A</a>

    <h2>📜 Your Search History</h2>

    {% if history %}
        {% for item in history reversed %}
            <div class="card">
                <div class="question">Q: {{ item.question }}</div>
                <div class="answer">A: {{ item.answer }}</div>
            </div>
        {% endfor %}
    {% else %}
        <p>No history yet 😄</p>
    {% endif %}

</div>

</body>
</html>
