<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }

        .glass {
            backdrop-filter: blur(18px);
            background: rgba(20, 18, 32, 0.65);
        }
    </style>
</head>

<body class="text-white">

<div class="min-h-screen bg-[url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f')] bg-cover bg-center">

    <div class="min-h-screen bg-black/80">

        <div class="relative h-[320px] flex flex-col justify-center items-center text-center">

            <h1 class="heading-font text-5xl font-bold">
                📚 Find Your Next Story
            </h1>

            <p class="text-gray-300 mt-3">
                Discover books you'll fall in love with
            </p>

            <a href="/ask/" 
            class="mt-6 inline-flex items-center gap-2 px-6 py-3 
            bg-gradient-to-r from-purple-500 to-pink-500 
            rounded-xl shadow-lg shadow-purple-500/30 
            hover:scale-105 transition">

                <span>Ask AI</span>
                <span>🤖</span>

            </a>

        </div>

        <div class="text-center mt-10 mb-8">
            <h2 class="heading-font text-3xl">
                Explore Books
            </h2>
        </div>

        <div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 px-6 pb-12">

            {% for book in books %}
            <div class="glass rounded-2xl shadow-xl hover:scale-[1.03] hover:shadow-purple-500/20 transition p-5">

                <h3 class="font-semibold text-lg text-white mb-2">
                    {{ book.title }}
                </h3>

                <p class="text-sm text-gray-300 mb-1">👤 {{ book.author }}</p>
                <p class="text-sm text-yellow-400 mb-1">⭐ {{ book.rating }}</p>
                <p class="text-sm text-gray-400 mb-2">📂 {{ book.genre }}</p>

                <p class="text-sm text-gray-300">
                    {{ book.description|truncatewords:15 }}
                </p>

                <a href="/book/{{ book.id }}/" class="block mt-4 text-pink-400 hover:text-white transition">
                    View Details →
                </a>

            </div>
            {% endfor %}

        </div>

    </div>

</div>

</body>
</html>
