<!DOCTYPE html>
<html>
<head>
    <title>Book Insight Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: #2c3e50;
        }

        .title:hover {
            color: #4CAF50;
        }

        .meta {
            font-size: 14px;
            color: #555;
            margin-top: 5px;
        }

        .summary {
            margin-top: 10px;
            color: #333;
        }

        .top-bar {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📚 Book Insight Dashboard</h1>

        <div class="top-bar">
            <a href="/ask/" class="btn">Ask Questions 🤖</a>
        </div>

        {% for book in books %}
            <div class="card">

                <a href="/book/{{ book.id }}/" class="title">
                    {{ book.title }}
                </a>

                <div class="meta">
                    👤 Author: {{ book.author|default:"Unknown" }} <br>
                    ⭐ Rating: {{ book.rating|default:"N/A" }} <br>
                    📂 Genre: {{ book.genre|default:"N/A" }}
                </div>

                <div class="summary">
                    {{ book.ai_summary|default:book.description|truncatewords:25 }}
                </div>

            </div>
        {% endfor %}

    </div>

</body>
</html>
