<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Book-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-[#fdfbfb] to-[#ebedee]">

<!-- 🔥 HERO SECTION -->
<div class="relative h-[300px] bg-[url('https://images.unsplash.com/photo-1512820790803-83ca734da794')] bg-cover bg-center">

    <div class="absolute inset-0 bg-black/50 flex flex-col justify-center items-center text-center">

        <h1 class="text-4xl md:text-5xl font-bold text-white font-[Playfair_Display]">
            Find Your Next Book 📚
        </h1>

        <p class="text-gray-200 mt-3">
            Discover stories you'll love
        </p>

        <a href="/ask/" 
class="mt-5 inline-flex items-center gap-2 px-6 py-3 
bg-white text-black 
rounded-lg shadow-md 
hover:bg-gray-200 hover:shadow-lg 
active:scale-95 
transition duration-200">

    <span>Ask AI</span>
    <span>🤖</span>

</a>

    </div>
</div>

<!-- 🔥 SECTION TITLE -->
<div class="text-center mt-10 mb-6">
    <h2 class="text-3xl font-[Playfair_Display] text-gray-800">
        Discover Your Next Book
    </h2>
</div>

<!-- 🔥 BOOK GRID -->
<div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 px-6 pb-10">

    {% for book in books %}
    <div class="bg-white rounded-xl shadow-md hover:shadow-xl hover:-translate-y-1 hover:scale-[1.02] transition duration-300 p-4">

        <h3 class="font-semibold text-lg text-gray-800 mb-2">
            {{ book.title }}
        </h3>

        <p class="text-sm text-gray-500 mb-1">👤 {{ book.author }}</p>
        <p class="text-sm text-yellow-500 mb-1">⭐ {{ book.rating }}</p>
        <p class="text-sm text-gray-500 mb-2">📂 {{ book.genre }}</p>

        <p class="text-sm text-gray-600">
            {{ book.description|truncatewords:15 }}
        </p>

        <a href="/book/{{ book.id }}/" class="block mt-3 text-red-500 hover:underline">
            View Details →
        </a>

    </div>
    {% endfor %}

</div>

</body>
</html>
